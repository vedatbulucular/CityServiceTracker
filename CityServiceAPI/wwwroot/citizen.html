<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vatandaş Portalı — Sorun Bildir | CityServiceTracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }

        .page-hero {
            background: linear-gradient(135deg, #2c3e50 0%, #18bc9c 100%);
            color: white;
            padding: 2.5rem 0 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.15);
        }
        .page-hero h1 { font-size: 2rem; font-weight: 700; }
        .page-hero p  { opacity: .88; margin-bottom: 0; }
        .back-link {
            color: rgba(255,255,255,.8);
            text-decoration: none;
            font-size: .9rem;
            transition: color .15s;
        }
        .back-link:hover { color: #fff; }

        .form-card {
            border: none; border-radius: 1.25rem;
            box-shadow: 0 8px 32px rgba(44,62,80,.12); overflow: hidden;
        }
        .form-card .card-header {
            background: linear-gradient(90deg, #18bc9c, #2c3e50);
            color: white; padding: 1.25rem 1.5rem; border-bottom: none;
        }
        .form-card .card-header h4 { margin: 0; font-weight: 600; }
        .form-control:focus, .form-select:focus {
            border-color: #18bc9c;
            box-shadow: 0 0 0 .2rem rgba(24,188,156,.25);
        }
        .input-group-text {
            background-color: #eaf6f3; border-color: #ced4da; color: #18bc9c;
        }

        /* Konum input grubu */
        .location-input-group .form-control { border-radius: .375rem 0 0 .375rem; }
        .btn-locate {
            background: linear-gradient(90deg, #3498db, #2980b9);
            border: none; color: white; font-weight: 600; white-space: nowrap;
            transition: all .18s ease;
        }
        .btn-locate:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(52,152,219,.4);
            color: white;
        }

        .btn-submit {
            background: linear-gradient(90deg, #18bc9c, #1abc9c);
            border: none; color: white; font-weight: 600;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(24,188,156,.45); color: white;
        }
        .btn-submit:active { transform: translateY(0); }

        /* Bildirim Listesi Kartları */
        .issue-card {
            border: none; border-radius: 1rem;
            box-shadow: 0 4px 18px rgba(44,62,80,.10);
            transition: transform .22s ease, box-shadow .22s ease; overflow: hidden;
        }
        .issue-card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(44,62,80,.18); }
        .issue-card .card-img-top { height: 190px; object-fit: cover; }
        .issue-card .no-image {
            height: 190px; background: linear-gradient(135deg, #bdc3c7, #95a5a6);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: .9rem;
        }
        .issue-card .card-title { font-weight: 600; color: #2c3e50; }
        .issue-card .card-footer { background: white; border-top: 1px solid #f0f4f8; }
        .section-title { font-weight: 700; color: #2c3e50; border-left: 4px solid #18bc9c; padding-left: .75rem; }

        /* GPS koordinat badge */
        .gps-badge {
            display: inline-flex; align-items: center; gap: .3rem;
            background: #e8f8f5; color: #17a589;
            padding: .2rem .6rem; border-radius: 1rem;
            font-size: .78rem; font-weight: 600;
            text-decoration: none; transition: background .15s;
        }
        .gps-badge:hover { background: #d0f0ea; color: #17a589; }

        /* Skeleton */
        @keyframes shimmer {
            0%   { background-position: -800px 0; }
            100% { background-position:  800px 0; }
        }
        .skeleton-card { border: none; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 18px rgba(44,62,80,.08); }
        .skeleton-block {
            background: linear-gradient(90deg, #e8edf2 25%, #d4dce6 50%, #e8edf2 75%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear; border-radius: .4rem;
        }
        .skeleton-img   { height: 190px; border-radius: 0; }
        .skeleton-title { height: 18px; width: 70%; margin-bottom: 10px; }
        .skeleton-text  { height: 12px; width: 90%; margin-bottom: 6px; }
        .skeleton-text.short { width: 55%; }
    </style>
</head>
<body>

<!-- ── Hero Başlık ── -->
<div class="page-hero">
    <div class="container">
        <a href="index.html" class="back-link mb-2 d-inline-block">
            <i class="fa-solid fa-chevron-left me-1"></i>Ana Sayfaya Dön
        </a>
        <h1 class="mb-1"><i class="fa-solid fa-circle-exclamation me-2"></i>Vatandaş Portalı</h1>
        <p><i class="fa-solid fa-location-dot me-1"></i>Çayırova Belediyesi — GPS destekli sorun bildirimi</p>
    </div>
</div>

<div class="container mb-5">

    <!-- ── Bildirim Formu ── -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div class="card form-card">
                <div class="card-header">
                    <h4><i class="fa-solid fa-pen-to-square me-2"></i>Yeni Sorun Bildir</h4>
                    <small class="opacity-75">Bölgemizdeki sorunları hızlıca yetkililere iletin</small>
                </div>
                <div class="card-body p-4">
                    <form id="issueForm">
                        <!-- Başlık -->
                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold">
                                <i class="fa-solid fa-heading text-success me-1"></i>Sorun Başlığı
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-pen"></i></span>
                                <input type="text" class="form-control" id="title"
                                       placeholder="Örn: Yolda büyük bir çukur var" required>
                            </div>
                        </div>

                        <!-- Açıklama -->
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">
                                <i class="fa-solid fa-align-left text-success me-1"></i>Detaylı Açıklama
                            </label>
                            <textarea class="form-control" id="description" rows="3"
                                      placeholder="Sorunu detaylıca anlatın..." required></textarea>
                        </div>

                        <!-- Kategori -->
                        <div class="mb-3">
                            <label for="category" class="form-label fw-semibold">
                                <i class="fa-solid fa-tags text-success me-1"></i>Kategori
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-list"></i></span>
                                <select class="form-select" id="category" required>
                                    <option value="" selected disabled>Kategori Seçin...</option>
                                    <option value="1">Altyapı (Pothole vb.)</option>
                                    <option value="2">Park ve Bahçeler</option>
                                    <option value="3">Temizlik</option>
                                </select>
                            </div>
                        </div>

                        <!-- GPS Konum (YENİ) -->
                        <div class="mb-3">
                            <label for="gpsLocation" class="form-label fw-semibold">
                                <i class="fa-solid fa-satellite-dish text-success me-1"></i>GPS Konumu
                                <span class="text-muted fw-normal">(İsteğe Bağlı)</span>
                            </label>
                            <div class="input-group location-input-group">
                                <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                                <input type="text" class="form-control" id="gpsLocation"
                                       placeholder="Konum bulmak için butona tıklayın..."
                                       readonly>
                                <button type="button" class="btn btn-locate" id="locateBtn"
                                        onclick="getLocation()">
                                    <i class="fa-solid fa-crosshairs me-1"></i>Konumumu Bul
                                </button>
                            </div>
                            <div class="form-text">
                                <i class="fa-solid fa-circle-info me-1 text-info"></i>
                                Tarayıcı konum iznine ihtiyaç duyar. Koordinatlar personele harita linki olarak gösterilir.
                            </div>
                        </div>

                        <!-- Fotoğraf -->
                        <div class="mb-4">
                            <label for="imageFile" class="form-label fw-semibold">
                                <i class="fa-solid fa-camera text-success me-1"></i>Fotoğraf Ekle
                                <span class="text-muted fw-normal">(İsteğe Bağlı)</span>
                            </label>
                            <input class="form-control" type="file" id="imageFile"
                                   accept="image/jpeg, image/png, image/webp">
                            <div class="form-text">
                                <i class="fa-solid fa-circle-info me-1"></i>Maks. 5 MB · JPG, PNG, WEBP
                            </div>
                        </div>

                        <!-- Gönder -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-submit btn-lg" id="submitBtn">
                                <i class="fa-solid fa-paper-plane me-2"></i>Bildirimi Gönder
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Güncel Bildirimler ── -->
    <div class="row mb-3">
        <div class="col-12">
            <h3 class="section-title">
                <i class="fa-solid fa-list-check me-2"></i>Güncel Bildirimler
            </h3>
        </div>
    </div>
    <div class="row" id="issuesContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // ── Skeleton yükleme ──────────────────────────────────────────────────────
    function showSkeletons(count = 3) {
        const container = document.getElementById('issuesContainer');
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="skeleton-card card h-100">
                        <div class="skeleton-block skeleton-img"></div>
                        <div class="card-body">
                            <div class="skeleton-block skeleton-title"></div>
                            <div class="skeleton-block skeleton-text"></div>
                            <div class="skeleton-block skeleton-text short"></div>
                        </div>
                    </div>
                </div>`;
        }
    }

    // ── 1. GPS KONUM ALMA ─────────────────────────────────────────────────────
    function getLocation() {
        const locateBtn = document.getElementById('locateBtn');
        const gpsInput  = document.getElementById('gpsLocation');

        // Tarayıcı desteği kontrolü
        if (!navigator.geolocation) {
            Swal.fire({
                icon: 'error',
                title: 'Desteklenmiyor',
                text:  'Tarayıcınız konum özelliğini desteklemiyor.',
                confirmButtonColor: '#e74c3c'
            });
            return;
        }

        // Buton yükleme modu
        locateBtn.disabled = true;
        locateBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Bulunuyor...';

        navigator.geolocation.getCurrentPosition(
            // Başarı: koordinatları input'a yaz
            (position) => {
                const lat = position.coords.latitude.toFixed(6);
                const lng = position.coords.longitude.toFixed(6);
                const coords = `${lat},${lng}`;

                gpsInput.value = coords;

                locateBtn.disabled = false;
                locateBtn.innerHTML = '<i class="fa-solid fa-check me-1"></i>Konum Alındı';
                locateBtn.style.background = 'linear-gradient(90deg, #27ae60, #2ecc71)';

                Swal.fire({
                    icon:             'success',
                    title:            'Konum Bulundu!',
                    html:             `
                        <p class="mb-2">GPS koordinatlarınız başarıyla alındı.</p>
                        <code style="font-size:.9rem">📍 ${coords}</code>
                        <br><br>
                        <a href="https://maps.google.com/?q=${coords}" target="_blank"
                           style="color:#18bc9c; font-size:.85rem">
                           <i class="fa-solid fa-map-location-dot"></i> Google Haritada Görüntüle
                        </a>`,
                    confirmButtonText:  'Tamam',
                    confirmButtonColor: '#18bc9c',
                    timer:              5000,
                    timerProgressBar:   true
                });
            },
            // Hata: kullanıcı izni reddetti veya timeout
            (error) => {
                locateBtn.disabled = false;
                locateBtn.innerHTML = '<i class="fa-solid fa-crosshairs me-1"></i>Konumumu Bul';

                const messages = {
                    1: 'Konum erişimine izin vermediniz. Tarayıcı ayarlarından izin verin.',
                    2: 'Konum bilgisi alınamadı. Lütfen tekrar deneyin.',
                    3: 'Konum alma işlemi zaman aşımına uğradı.'
                };
                Swal.fire({
                    icon:             'warning',
                    title:            'Konum Alınamadı',
                    text:             messages[error.code] || 'Bilinmeyen bir hata oluştu.',
                    confirmButtonColor: '#f39c12'
                });
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // ── 2. BİLDİRİMLERİ LİSTELE ──────────────────────────────────────────────
    async function loadIssues() {
        showSkeletons(6);
        try {
            const response = await fetch('/api/issues');
            if (!response.ok) throw new Error('API hatası');
            const issues = await response.json();
            const container = document.getElementById('issuesContainer');
            container.innerHTML = '';

            if (issues.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5 text-muted">
                        <i class="fa-solid fa-inbox fa-3x mb-3 d-block"></i>
                        <p class="fs-5">Henüz bildirilmiş bir sorun bulunmuyor.</p>
                    </div>`;
                return;
            }

            issues.forEach(issue => {
                let statusBadge = '';
                if (issue.status === 'Pending')
                    statusBadge = '<span class="badge bg-warning text-dark"><i class="fa-solid fa-clock me-1"></i>Beklemede</span>';
                else if (issue.status === 'InProgress')
                    statusBadge = '<span class="badge bg-info text-dark"><i class="fa-solid fa-spinner fa-spin me-1"></i>İşlemde</span>';
                else
                    statusBadge = '<span class="badge bg-success"><i class="fa-solid fa-circle-check me-1"></i>Tamamlandı</span>';

                const imageHtml = issue.imageUrl
                    ? `<img src="${issue.imageUrl}" class="card-img-top" alt="Sorun Görseli">`
                    : `<div class="no-image"><i class="fa-regular fa-image fa-2x me-2"></i>Görsel Yok</div>`;

                // GPS linki varsa göster
                const gpsHtml = issue.gpsLocation
                    ? `<a href="https://maps.google.com/?q=${issue.gpsLocation}" target="_blank" class="gps-badge">
                           <i class="fa-solid fa-location-dot"></i>${issue.gpsLocation}
                       </a>`
                    : '';

                const formattedDate = new Date(issue.reportedAt).toLocaleDateString('tr-TR');

                container.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card issue-card h-100">
                            ${imageHtml}
                            <div class="card-body">
                                <h5 class="card-title">
                                    <i class="fa-solid fa-triangle-exclamation text-warning me-1"></i>${issue.title}
                                </h5>
                                <p class="card-text text-muted small">${issue.description}</p>
                                <p class="card-text">
                                    <small>
                                        <i class="fa-solid fa-location-dot text-danger me-1"></i>
                                        <strong>Konum:</strong> ${issue.locationData}
                                    </small>
                                </p>
                                ${gpsHtml ? `<div class="mt-2">${gpsHtml}</div>` : ''}
                            </div>
                            <div class="card-footer d-flex justify-content-between align-items-center">
                                ${statusBadge}
                                <small class="text-muted">
                                    <i class="fa-regular fa-calendar me-1"></i>${formattedDate}
                                </small>
                            </div>
                        </div>
                    </div>`;
            });

        } catch (error) {
            console.error(error);
            document.getElementById('issuesContainer').innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fa-solid fa-plug-circle-exclamation fa-3x text-danger mb-3 d-block"></i>
                    <p class="text-danger fs-5">Sunucuya bağlanılamadı.</p>
                </div>`;
        }
    }
    window.onload = loadIssues;

    // ── 3. YENİ BİLDİRİM OLUŞTUR ─────────────────────────────────────────────
    document.getElementById('issueForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');

        const issueData = {
            citizenId:   1,
            categoryId:  parseInt(document.getElementById('category').value),
            title:       document.getElementById('title').value,
            description: document.getElementById('description').value,
            locationData:'Çayırova',
            // Yeni alan: GPS koordinatı (boşsa null gönder)
            gpsLocation: document.getElementById('gpsLocation').value || null
        };

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Gönderiliyor...';

        try {
            const response = await fetch('/api/issues', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(issueData)
            });

            if (response.ok) {
                const createdIssue = await response.json();

                const imageFile = document.getElementById('imageFile').files[0];
                if (imageFile) {
                    const formData = new FormData();
                    formData.append('file', imageFile);
                    await fetch(`/api/issues/${createdIssue.id}/upload-image`, {
                        method: 'POST', body: formData
                    });
                }

                await Swal.fire({
                    icon:              'success',
                    title:             'Bildirim Alındı!',
                    text:              'Sorun bildiriminiz başarıyla sisteme iletildi. Teşekkür ederiz.',
                    confirmButtonText: 'Tamam',
                    confirmButtonColor:'#18bc9c',
                    timer:             4000, timerProgressBar: true
                });

                document.getElementById('issueForm').reset();
                // Konum butonunu sıfırla
                const locateBtn = document.getElementById('locateBtn');
                locateBtn.innerHTML = '<i class="fa-solid fa-crosshairs me-1"></i>Konumumu Bul';
                locateBtn.style.background = '';
                loadIssues();

            } else {
                Swal.fire({ icon:'error', title:'Hata!', text:'Bilgileri kontrol edip tekrar deneyin.', confirmButtonColor:'#e74c3c' });
            }
        } catch (err) {
            console.error(err);
            Swal.fire({ icon:'warning', title:'Bağlantı Sorunu', text:'Sunucuya ulaşılamıyor.', confirmButtonColor:'#f39c12' });
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Bildirimi Gönder';
        }
    });
</script>
</body>
</html>
