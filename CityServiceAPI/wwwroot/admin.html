<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli — Operasyon Merkezi</title>

    <!-- Bootswatch Flatly teması -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        body {
            background-color: #1a2332;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── Login ekranı ── */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 430px;
            border: none;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
        }
        .login-card .card-header {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            border-bottom: none;
        }
        .login-card .card-header .shield-icon {
            font-size: 2.5rem;
            margin-bottom: .75rem;
            opacity: .95;
        }
        .login-card .card-header h4 { font-weight: 700; margin: 0; }
        .login-card .card-header small { opacity: .8; }
        .login-card .card-body { background: #fff; padding: 2rem; }

        .form-control:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 .2rem rgba(231,76,60,.2);
        }
        .input-group-text {
            background-color: #fdf0ef;
            border-color: #ced4da;
            color: #e74c3c;
        }

        .btn-login {
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            font-weight: 600;
            letter-spacing: .3px;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231,76,60,.45);
            color: white;
        }

        /* ── Dashboard ── */
        .dashboard-nav {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            padding: 1rem 0;
            box-shadow: 0 2px 15px rgba(0,0,0,.3);
            margin-bottom: 2rem;
        }
        .dashboard-nav .nav-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
        }
        .dashboard-nav .nav-brand i { color: #e74c3c; }

        .btn-logout {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,.4);
            color: rgba(255,255,255,.85);
            transition: all .18s ease;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,.1);
            border-color: rgba(255,255,255,.7);
            color: white;
            transform: translateY(-1px);
        }

        /* ── Görev kartları ── */
        .task-card {
            border: none;
            border-radius: 1rem;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,.15);
            transition: transform .22s ease, box-shadow .22s ease;
            overflow: hidden;
        }
        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,.22);
        }
        .task-card .card-header {
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: .75rem 1.25rem;
            border-bottom: none;
        }
        .task-card .card-title { font-weight: 700; margin: 0; font-size: 1rem; }
        .task-card .card-text  { color: #555; font-size: .9rem; }

        .btn-assign {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            border: none;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .btn-assign:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(243,156,18,.45);
            color: white;
        }
        .btn-assign:active { transform: translateY(0); }

        /* ── Boş durum & yükleme ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,255,255,.55);
        }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1rem; display: block; }

        /* ── Skeleton ── */
        @keyframes shimmer {
            0%   { background-position: -800px 0; }
            100% { background-position:  800px 0; }
        }
        .skeleton-card {
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
        }
        .skeleton-block {
            background: linear-gradient(90deg, #2e3d52 25%, #374a63 50%, #2e3d52 75%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: .4rem;
        }
        .skeleton-header { height: 52px; border-radius: 0; }
        .skeleton-title  { height: 16px; width: 65%; margin-bottom: 10px; }
        .skeleton-text   { height: 12px; width: 85%; margin-bottom: 6px; }
        .skeleton-btn    { height: 38px; width: 100%; margin-top: 12px; }

        /* ── İstatistik badge ── */
        .stats-badge {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.2);
            color: white;
            padding: .4rem 1rem;
            border-radius: 2rem;
            font-size: .85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN EKRANI
══════════════════════════════════════════ -->
<div class="login-wrapper" id="loginSection">
    <div class="login-card card">
        <div class="card-header">
            <div class="shield-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <h4>Yetkili Personel Girişi</h4>
            <small>Çayırova Belediyesi — Operasyon Merkezi</small>
        </div>
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold text-secondary">
                        <i class="fa-solid fa-envelope me-1"></i>E-Posta Adresi
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="email" class="form-control" id="email"
                               placeholder="personel@belediye.gov.tr" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">
                        <i class="fa-solid fa-lock me-1"></i>Şifre
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                        <input type="password" class="form-control" id="password"
                               placeholder="Şifrenizi girin" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100 btn-lg" id="loginBtn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Giriş Yap
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     DASHBOARD EKRANI
══════════════════════════════════════════ -->
<div id="dashboardSection" style="display: none;">

    <!-- Üst navigasyon -->
    <div class="dashboard-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="nav-brand">
                <i class="fa-solid fa-city me-2"></i>Operasyon Merkezi
                <span class="stats-badge ms-3" id="pendingCount">
                    <i class="fa-solid fa-clock me-1"></i>— Bekleyen
                </span>
            </div>
            <button class="btn btn-logout btn-sm" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket me-1"></i>Çıkış Yap
            </button>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row" id="adminIssuesContainer">
            <!-- Kartlar burada render edilir -->
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // ── Skeleton yükleme ──────────────────────────────────────────────────────
    function showAdminSkeletons(count = 4) {
        const container = document.getElementById('adminIssuesContainer');
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            container.innerHTML += `
                <div class="col-md-6 mb-4">
                    <div class="skeleton-card">
                        <div class="skeleton-block skeleton-header mb-0"></div>
                        <div class="p-3" style="background:#243447;">
                            <div class="skeleton-block skeleton-title"></div>
                            <div class="skeleton-block skeleton-text"></div>
                            <div class="skeleton-block skeleton-text" style="width:60%"></div>
                            <div class="skeleton-block skeleton-btn"></div>
                        </div>
                    </div>
                </div>`;
        }
    }

    // ── 1. GİRİŞ YAPMA VE TOKEN ALMA ────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const loginBtn = document.getElementById('loginBtn');
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Butonu yükleme moduna al
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Doğrulanıyor...';

        try {
            const response = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('jwtToken', data.token);

                // ── SweetAlert2 başarı ──
                await Swal.fire({
                    icon:              'success',
                    title:             'Giriş Başarılı!',
                    text:              'Operasyon Merkezine yönlendiriliyorsunuz.',
                    confirmButtonText: 'Devam Et',
                    confirmButtonColor:'#e74c3c',
                    timer:             2000,
                    timerProgressBar:  true,
                    showConfirmButton:  false
                });

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadAdminIssues();

            } else {
                Swal.fire({
                    icon:             'error',
                    title:            'Giriş Başarısız',
                    text:             'Hatalı e-posta veya şifre. Lütfen tekrar deneyin.',
                    confirmButtonColor:'#e74c3c'
                });
            }
        } catch (error) {
            console.error(error);
            Swal.fire({
                icon:             'warning',
                title:            'Bağlantı Hatası',
                text:             'Sunucuya bağlanılamadı. Ağ bağlantınızı kontrol edin.',
                confirmButtonColor:'#f39c12'
            });
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Giriş Yap';
        }
    });

    // ── 2. BEKLEYEN SORUNLARI GETİRME ───────────────────────────────────────
    async function loadAdminIssues() {
        showAdminSkeletons(4);

        try {
            const response = await fetch('/api/issues');
            if (!response.ok) throw new Error('API yanıt vermedi');

            const issues    = await response.json();
            const container = document.getElementById('adminIssuesContainer');
            container.innerHTML = '';

            const pendingIssues = issues.filter(i => i.status === 'Pending');

            // Navigasyon sayacını güncelle
            document.getElementById('pendingCount').innerHTML =
                `<i class="fa-solid fa-clock me-1"></i>${pendingIssues.length} Bekleyen`;

            if (pendingIssues.length === 0) {
                container.innerHTML = `
                    <div class="col-12 empty-state">
                        <i class="fa-solid fa-circle-check text-success"></i>
                        <p class="fs-5">Tüm bildirimler işleme alındı. Harika iş!</p>
                    </div>`;
                return;
            }

            pendingIssues.forEach(issue => {
                // GPS koordinatı varsa tıklanabilir harita linki oluştur
                const mapsHtml = issue.gpsLocation
                    ? `<a href="https://maps.google.com/?q=${issue.gpsLocation}" target="_blank"
                          class="btn btn-sm btn-outline-info w-100 mb-2"
                          style="border-radius:.5rem; font-size:.82rem;">
                           <i class="fa-solid fa-map-location-dot me-1"></i>
                           Haritada Gör
                           <small class="ms-1 opacity-75">(${issue.gpsLocation})</small>
                       </a>`
                    : `<div class="text-muted small mb-2" style="font-size:.78rem;">
                           <i class="fa-solid fa-location-xmark me-1"></i>GPS koordinatı yok
                       </div>`;

                const card = `
                    <div class="col-md-6 mb-4">
                        <div class="task-card card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="card-title">
                                    <i class="fa-solid fa-triangle-exclamation me-2 opacity-75"></i>${issue.title}
                                </h5>
                                <span class="badge bg-warning text-dark ms-2 flex-shrink-0">
                                    <i class="fa-solid fa-hourglass-half me-1"></i>Bekliyor
                                </span>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <p class="card-text flex-grow-1">
                                    <i class="fa-solid fa-align-left text-muted me-1"></i>${issue.description}
                                </p>
                                <div class="d-flex gap-2 text-muted small mb-3">
                                    <span><i class="fa-solid fa-location-dot me-1 text-danger"></i>${issue.locationData || '—'}</span>
                                    <span class="ms-auto"><i class="fa-regular fa-calendar me-1"></i>${new Date(issue.reportedAt).toLocaleDateString('tr-TR')}</span>
                                </div>
                                ${mapsHtml}
                                <button class="btn btn-assign" onclick="assignTask(${issue.id})">
                                    <i class="fa-solid fa-hand-pointer me-2"></i>Görevi Üstlen
                                </button>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });

        } catch (error) {
            console.error(error);
            document.getElementById('adminIssuesContainer').innerHTML = `
                <div class="col-12 empty-state">
                    <i class="fa-solid fa-plug-circle-exclamation text-danger"></i>
                    <p class="text-danger">Veriler yüklenemedi. Sunucu bağlantısını kontrol edin.</p>
                </div>`;
        }
    }

    // ── 3. GÖREV ATAMA (JWT ile) ─────────────────────────────────────────────
    async function assignTask(issueId) {
        const token = localStorage.getItem('jwtToken');

        // Kullanıcıya onay sor
        const confirm = await Swal.fire({
            icon:               'question',
            title:              'Görevi Üstlen?',
            text:               'Bu bildirimi kendinize atamak istiyor musunuz?',
            showCancelButton:   true,
            confirmButtonText:  '<i class="fa-solid fa-check me-1"></i>Evet, Üstlen',
            cancelButtonText:   'İptal',
            confirmButtonColor: '#f39c12',
            cancelButtonColor:  '#6c757d'
        });

        if (!confirm.isConfirmed) return;

        try {
            const response = await fetch(`/api/issues/${issueId}/assign`, {
                method:  'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.ok) {
                await Swal.fire({
                    icon:              'success',
                    title:             'Görev Üstlenildi!',
                    text:              'Bildirim durumu "İşlemde" olarak güncellendi.',
                    confirmButtonColor:'#18bc9c',
                    timer:             2500,
                    timerProgressBar:  true,
                    showConfirmButton:  false
                });
                loadAdminIssues(); // Listeyi yenile
            } else {
                Swal.fire({
                    icon:             'error',
                    title:            'Yetki Hatası',
                    text:             'Bu işlem için yetkiniz bulunmuyor. (401 Unauthorized)',
                    confirmButtonColor:'#e74c3c'
                });
            }
        } catch (error) {
            console.error(error);
            Swal.fire({
                icon:             'warning',
                title:            'Bağlantı Hatası',
                text:             'İstek gönderilirken bir sorun oluştu.',
                confirmButtonColor:'#f39c12'
            });
        }
    }

    // ── 4. ÇIKIŞ YAPMA ───────────────────────────────────────────────────────
    async function logout() {
        const confirm = await Swal.fire({
            icon:               'question',
            title:              'Çıkış Yap?',
            text:               'Oturumunuz sonlandırılacak.',
            showCancelButton:   true,
            confirmButtonText:  '<i class="fa-solid fa-right-from-bracket me-1"></i>Evet, Çıkış Yap',
            cancelButtonText:   'İptal',
            confirmButtonColor: '#e74c3c',
            cancelButtonColor:  '#6c757d'
        });

        if (confirm.isConfirmed) {
            localStorage.removeItem('jwtToken');
            location.reload();
        }
    }
</script>

</body>
</html>
